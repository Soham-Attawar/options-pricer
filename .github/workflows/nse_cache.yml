name: NSE Cache Updater

on:
  schedule:
    - cron: '*/5 3-10 * * 1-5'
  workflow_dispatch:

jobs:
  update-cache:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.12'

    - name: Install dependencies
      run: |
        pip install requests nse httpx[http2]

    - name: Run NSE Cache
      env:
        SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
        SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
      run: |
        python nse_cache_github.py